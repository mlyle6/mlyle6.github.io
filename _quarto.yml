project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!drafts/"

website:
  title: "Matthew Lyle"
  description: "Associate Professor of Accounting, Goizueta Business School, Emory University"
  site-url: "https://mlyle6.github.io"
  repo-url: "https://github.com/mlyle6/mlyle6.github.io"

  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: teaching.qmd
        text: Teaching
      - href: service.qmd
        text: Service
      - href: cv.qmd
        text: CV
      - href: contact.qmd
        text: Contact
    right:
      - icon: google
        href: https://scholar.google.com/citations?user=YOUR_ID
        aria-label: Google Scholar
      - icon: github
        href: https://github.com/mlyle6
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/YOUR-HANDLE
        aria-label: LinkedIn

  page-footer:
    left: "Matthew Lyle &copy; {{< now >}}"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: litera
    css: styles.css
    toc: true
    toc-depth: 2
    toc-location: right
    grid:
      sidebar-width: 250px
      body-width: 800px
      margin-width: 250px
    link-external-newwindow: true
    link-external-icon: true

execute:
  freeze: auto
